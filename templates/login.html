<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Allergy System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-bg">

<div class="auth-wrapper">
    <div class="auth-card">

        <div style="text-align:center; margin-bottom:1.5rem;">
            <div style="display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;background:linear-gradient(135deg,#0ea5e9,#14b8a6);border-radius:18px;font-size:2rem;margin-bottom:1rem;">🧬</div>
        </div>

        <h1 class="system-title">AI Allergy System</h1>
        <p class="subtitle">Sign in to access your health dashboard</p>

        <form method="POST" class="auth-form">

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn primary full-btn" style="margin-top:0.5rem;">
                Login to Dashboard
            </button>

        </form>

        <div class="auth-links">
            <p>Don't have an account? <a href="/signup">Create New Account</a></p>
        </div>

        <p style="text-align:center;font-size:0.72rem;color:#94a3b8;margin-top:1.5rem;">
            🔒 Secure healthcare data. Protected by AI Allergy System.
        </p>

    </div>
</div>

</body>
</html>
