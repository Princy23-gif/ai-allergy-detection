<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Scan | AI Allergy System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="topnav">
    <a href="/dashboard" class="topnav-logo"><span>🧬 AI Allergy</span></a>
    <div class="topnav-links">
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/predict">🤖 Predict</a>
        <a href="/image" class="active">🖼 Image Scan</a>
        <a href="/voice">🎙 Voice</a>
        <a href="/history">📊 History</a>
        <a href="/profile">👤 Profile</a>
    </div>
    <div class="topnav-right">
        <a href="/logout" class="topnav-logout">Logout</a>
    </div>
</nav>

<div class="center-wrapper text-bg" style="padding-top:80px;">

    <div class="glass predict-card">

        <div style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:linear-gradient(135deg,#0ea5e9,#14b8a6);border-radius:16px;font-size:1.6rem;margin-bottom:1.25rem;">🖼️</div>

        <h1>Image-Based Detection</h1>
        <p class="subtitle">Upload a food or allergen image for AI analysis</p>

        <form method="POST" enctype="multipart/form-data" id="uploadForm">

            <label for="imageInput">
                <div class="upload-zone" id="dropZone">
                    <div class="upload-zone-icon">📁</div>
                    <h3 id="dropText">Click or drag & drop image here</h3>
                    <p>Supports JPG, PNG, GIF — up to 10MB</p>
                    <p style="margin-top:8px;font-size:0.78rem;color:#0284c7;">Example: upload file named <strong>milk.jpg</strong>, <strong>dust.png</strong></p>
                </div>
            </label>

            <input type="file" name="image" id="imageInput" accept="image/*" required onchange="previewImage(event)">

            <div id="previewBox" style="display:none;margin-bottom:1rem;text-align:center;">
                <img id="previewImg" style="max-width:100%;max-height:200px;border-radius:12px;border:1px solid #e2e8f0;" alt="Preview">
            </div>

            <button type="submit" class="btn primary full-btn" id="scanBtn" style="margin-top:0.5rem;">
                🔍 Scan & Predict Allergy
            </button>

        </form>

        <a href="/dashboard" class="back-link">← Back to Dashboard</a>

    </div>

</div>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('previewBox').style.display = 'block';
        document.getElementById('dropText').textContent = '✅ ' + file.name;
    };
    reader.readAsDataURL(file);
}

const dropZone = document.getElementById('dropZone');
['dragover', 'dragenter'].forEach(evt => {
    dropZone.addEventListener(evt, e => {
        e.preventDefault();
        dropZone.style.borderColor = '#0284c7';
        dropZone.style.background = '#bae6fd';
    });
});
['dragleave', 'drop'].forEach(evt => {
    dropZone.addEventListener(evt, e => {
        e.preventDefault();
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
    });
});
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    const files = e.dataTransfer.files;
    if (files.length) {
        document.getElementById('imageInput').files = files;
        previewImage({ target: { files: files } });
    }
});
</script>

</body>
</html>
